<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Playlist Forge</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUGxheWxpc3QgRm9yZ2UiLCJzaG9ydF9uYW1lIjoiUGxheWxpc3QiLCJzdGFydF91cmwiOiIuLyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjBmMTQiLCJ0aGVtZV9jb2xvciI6IiNmZjAwMDAifQ==">
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a22;
    --accent: #ff3b3b;
    --accent2: #ff6b6b;
    --text: #f2f2f5;
    --sub: #9a9aa5;
    --border: #2a2a34;
    --success: #3ddc84;
    --warn: #ffb454;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: linear-gradient(160deg, #0f0f14 0%, #17171f 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  h1 {
    font-size: 22px;
    margin: 10px 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle {
    color: var(--sub);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 12px;
    color: var(--accent2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  button {
    font-family: inherit;
    border: none;
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    width: 100%;
  }
  .btn-secondary {
    background: #2a2a34;
    color: var(--text);
    width: 100%;
  }
  .btn-small {
    background: #2a2a34;
    color: var(--text);
    padding: 7px 12px;
    font-size: 12.5px;
    border-radius: 8px;
  }
  .btn-small.active {
    background: var(--accent);
    color: white;
  }
  textarea, input[type=text] {
    width: 100%;
    background: #12121a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  textarea { min-height: 110px; }
  textarea:focus, input:focus { outline: 1px solid var(--accent); }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #12121a;
    border-radius: 12px;
    padding: 10px 12px;
  }
  .user-badge img {
    width: 36px; height: 36px; border-radius: 50%;
  }
  .user-badge .name { font-size: 14px; font-weight: 600; }
  .user-badge .email { font-size: 11px; color: var(--sub); }
  .quota-note { font-size: 11px; color: var(--sub); margin-top: 8px; text-align: right; }

  .warn-box {
    background: rgba(255,180,84,0.1);
    border: 1px solid rgba(255,180,84,0.3);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12.5px;
    color: var(--warn);
    margin-bottom: 12px;
  }

  .song-block {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .song-block:last-child { border-bottom: none; }
  .song-block-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .song-query { font-size: 12.5px; color: var(--sub); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dup-badge {
    font-size: 10.5px;
    background: rgba(255,180,84,0.2);
    color: var(--warn);
    padding: 2px 7px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .candidate-list { display: flex; flex-direction: column; gap: 6px; }
  .candidate-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 10px;
    background: #12121a;
    border: 2px solid transparent;
    cursor: pointer;
  }
  .candidate-row.selected {
    border-color: var(--accent);
    background: rgba(255,59,59,0.08);
  }
  .candidate-row.excluded {
    opacity: 0.35;
  }
  .candidate-row img {
    width: 50px; height: 38px; object-fit: cover; border-radius: 6px; flex-shrink: 0;
    background: #222;
  }
  .candidate-info { flex: 1; min-width: 0; }
  .candidate-title { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .candidate-channel { font-size: 11px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .official-badge {
    font-size: 9.5px;
    background: rgba(61,220,132,0.2);
    color: var(--success);
    padding: 1px 5px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .radio-dot.on { border-color: var(--accent); }
  .radio-dot.on::after {
    content: '';
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
  }
  .status-none { color: #d9534f; font-size: 12px; padding: 6px 0; }
  .status-searching { color: var(--sub); font-size: 12px; display: flex; align-items: center; gap: 6px; padding: 6px 0; }

  .progress-text { font-size: 12px; color: var(--sub); margin-top: 8px; text-align: center; }
  .result-box {
    background: #12121a;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    font-size: 14px;
  }
  .result-box a {
    color: var(--accent2);
    word-break: break-all;
  }
  .hidden { display: none !important; }
  .row-buttons { display: flex; gap: 10px; }
  .row-buttons button { flex: 1; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-note { font-size: 11px; color: var(--sub); text-align: center; margin-top: 24px; line-height: 1.6; }

  .mode-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
  .mode-toggle button { flex: 1; }

  .order-list { display: flex; flex-direction: column; gap: 6px; }
  .order-row {
    display: flex; align-items: center; gap: 10px;
    background: #12121a; border-radius: 10px; padding: 8px;
  }
  .order-row img { width: 44px; height: 34px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .order-row .order-title { font-size: 12.5px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .order-arrows { display: flex; gap: 4px; flex-shrink: 0; }
  .order-arrows button {
    padding: 4px 8px; font-size: 12px; border-radius: 6px;
  }

  select {
    width: 100%;
    background: #12121a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
  }
</style>
</head>
<body>

<h1>🎵 Playlist Forge</h1>
<div class="subtitle">曲名リストからYouTube Musicのプレイリストを自動作成</div>

<!-- ログインカード -->
<div class="card" id="loginCard">
  <h2>1. Googleでログイン</h2>
  <div id="loginArea">
    <button class="btn-primary" id="loginBtn">Googleでログイン</button>
  </div>
  <div id="userArea" class="hidden">
    <div class="user-badge">
      <img id="userPhoto" src="" alt="">
      <div>
        <div class="name" id="userName"></div>
        <div class="email" id="userEmail"></div>
      </div>
    </div>
    <div class="quota-note" id="quotaNote"></div>
  </div>
</div>

<!-- AI判定設定カード -->
<div class="card hidden" id="aiSettingsCard">
  <h2>
    AI判定（任意）
    <span id="aiStatusBadge" class="official-badge" style="font-size:10.5px;">未設定</span>
  </h2>
  <div style="font-size:12px; color:var(--sub); margin-bottom:10px; line-height:1.6;">
    Gemini APIキーを入れると、公式音源かどうかをAIが追加で判定してくれるよ。<br>
    キーはこの端末のブラウザだけに保存されて、GitHub側には一切送られないよ。
  </div>
  <input type="password" id="geminiKeyInput" placeholder="Gemini APIキー（AQ.から始まる文字列）" autocomplete="off">
  <div style="height:10px"></div>
  <div class="row-buttons">
    <button class="btn-secondary" id="geminiKeyClearBtn">キーを削除</button>
    <button class="btn-primary" id="geminiKeySaveBtn">保存する</button>
  </div>
</div>

<!-- 曲入力カード -->
<div class="card hidden" id="inputCard">
  <h2>2. 曲名リストを貼り付け</h2>
  <textarea id="songInput" placeholder="1曲1行で貼り付けてね&#10;例:&#10;優里 - ドライフラワー&#10;YOASOBI 群青&#10;Mrs. GREEN APPLE 青と夏"></textarea>
  <div style="height:12px"></div>
  <button class="btn-primary" id="searchBtn">曲を検索する</button>
</div>

<!-- 検索結果カード -->
<div class="card hidden" id="resultsCard">
  <h2>3. 曲を確認・選択</h2>
  <div id="dupWarn" class="warn-box hidden"></div>
  <div id="progressText" class="progress-text hidden"></div>
  <div id="songList"></div>
  <div style="height:14px"></div>

  <div class="mode-toggle">
    <button class="btn-small active" id="modeNew">新規プレイリスト</button>
    <button class="btn-small" id="modeExisting">既存に追加</button>
  </div>
  <input type="text" id="playlistName" placeholder="プレイリスト名（例: 2026年7月のお気に入り）">
  <select id="existingSelect" class="hidden"></select>

  <div style="height:12px"></div>
  <div class="row-buttons">
    <button class="btn-secondary" id="backBtn">戻る</button>
    <button class="btn-primary" id="createBtn">プレイリストを作成</button>
  </div>
</div>

<!-- 並び替えカード -->
<div class="card hidden" id="orderCard">
  <h2>4. 曲順を確認</h2>
  <div class="order-list" id="orderList"></div>
  <div style="height:14px"></div>
  <div class="row-buttons">
    <button class="btn-secondary" id="orderBackBtn">戻る</button>
    <button class="btn-primary" id="orderConfirmBtn">この順番で追加</button>
  </div>
</div>

<!-- 完了カード -->
<div class="card hidden" id="doneCard">
  <h2>✅ 完成！</h2>
  <div class="result-box">
    <div id="doneCount" style="margin-bottom:8px;"></div>
    <a id="playlistLink" href="#" target="_blank">YouTube Musicで開く</a>
  </div>
  <div style="height:12px"></div>
  <button class="btn-secondary" id="anotherBtn">もう一度作る</button>
</div>

<div class="footer-note">
  マスター専用ツール・YouTube Data API使用<br>
  無料枠の範囲で動作するよ
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = "1244880388-sl1ijkj4urp7lpu25hc08ajcq8u9qp8t.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/youtube";
const GEMINI_MODEL = "gemini-3.1-flash-lite";
function getGeminiApiKey() {
  return localStorage.getItem('pf_gemini_key') || '';
}
function setGeminiApiKey(key) {
  if (key) localStorage.setItem('pf_gemini_key', key);
  else localStorage.removeItem('pf_gemini_key');
}

let accessToken = null;
let tokenClient = null;
let songs = []; // {query, candidates: [...], selectedIndex, status, isDup}
let addMode = 'new'; // 'new' | 'existing'
let userPlaylists = [];
let finalOrder = []; // 並び替え後の曲配列

// ===== クォータ管理(日付ベース・localStorageで永続化) =====
function todayKey() {
  const d = new Date();
  return `pf_quota_${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
}
function getQuotaUsed() {
  const v = localStorage.getItem(todayKey());
  return v ? parseInt(v, 10) : 0;
}
function addQuota(amount) {
  const current = getQuotaUsed();
  localStorage.setItem(todayKey(), String(current + amount));
  updateQuotaNote();
}

const els = {
  loginBtn: document.getElementById('loginBtn'),
  loginArea: document.getElementById('loginArea'),
  userArea: document.getElementById('userArea'),
  userPhoto: document.getElementById('userPhoto'),
  userName: document.getElementById('userName'),
  userEmail: document.getElementById('userEmail'),
  quotaNote: document.getElementById('quotaNote'),
  aiSettingsCard: document.getElementById('aiSettingsCard'),
  aiStatusBadge: document.getElementById('aiStatusBadge'),
  geminiKeyInput: document.getElementById('geminiKeyInput'),
  geminiKeyClearBtn: document.getElementById('geminiKeyClearBtn'),
  geminiKeySaveBtn: document.getElementById('geminiKeySaveBtn'),
  inputCard: document.getElementById('inputCard'),
  songInput: document.getElementById('songInput'),
  searchBtn: document.getElementById('searchBtn'),
  resultsCard: document.getElementById('resultsCard'),
  dupWarn: document.getElementById('dupWarn'),
  songList: document.getElementById('songList'),
  progressText: document.getElementById('progressText'),
  modeNew: document.getElementById('modeNew'),
  modeExisting: document.getElementById('modeExisting'),
  playlistName: document.getElementById('playlistName'),
  existingSelect: document.getElementById('existingSelect'),
  backBtn: document.getElementById('backBtn'),
  createBtn: document.getElementById('createBtn'),
  orderCard: document.getElementById('orderCard'),
  orderList: document.getElementById('orderList'),
  orderBackBtn: document.getElementById('orderBackBtn'),
  orderConfirmBtn: document.getElementById('orderConfirmBtn'),
  doneCard: document.getElementById('doneCard'),
  doneCount: document.getElementById('doneCount'),
  playlistLink: document.getElementById('playlistLink'),
  anotherBtn: document.getElementById('anotherBtn'),
};

function updateQuotaNote() {
  els.quotaNote.textContent = `本日の目安使用量: 約${getQuotaUsed()} / 10,000 ユニット`;
}

function maskKey(key) {
  if (!key || key.length < 8) return '••••••••';
  return key.slice(0, 4) + '••••••••' + key.slice(-4);
}

function refreshAiStatusBadge() {
  const key = getGeminiApiKey();
  if (key) {
    els.aiStatusBadge.textContent = '設定済み・AI判定ON';
    els.aiStatusBadge.style.color = 'var(--success)';
    els.geminiKeyInput.value = '';
    els.geminiKeyInput.placeholder = '保存済み: ' + maskKey(key) + '（変更する場合のみ入力してね）';
  } else {
    els.aiStatusBadge.textContent = '未設定（ルールのみ）';
    els.aiStatusBadge.style.color = 'var(--sub)';
    els.geminiKeyInput.value = '';
    els.geminiKeyInput.placeholder = 'Gemini APIキー（AQ.から始まる文字列）';
  }
}

els.geminiKeySaveBtn.addEventListener('click', () => {
  const v = els.geminiKeyInput.value.trim();
  if (!v) { alert('キーを入力してねぇ'); return; }
  setGeminiApiKey(v);
  els.geminiKeyInput.value = '';
  refreshAiStatusBadge();
  alert('保存したよ！次回の検索からAI判定が有効になるよ');
});

els.geminiKeyClearBtn.addEventListener('click', () => {
  if (!confirm('保存してあるAPIキーを削除する？')) return;
  setGeminiApiKey('');
  refreshAiStatusBadge();
});

function decodeHtmlEntities(str) {
  if (!str) return '';
  const el = document.createElement('textarea');
  el.innerHTML = str;
  return el.value;
}

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        alert('ログインに失敗したよ: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      await fetchUserInfo();
    }
  });
}

async function fetchUserInfo() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const data = await res.json();
    els.userPhoto.src = data.picture || '';
    els.userName.textContent = data.name || 'マスター';
    els.userEmail.textContent = data.email || '';
    els.loginArea.classList.add('hidden');
    els.userArea.classList.remove('hidden');
    els.aiSettingsCard.classList.remove('hidden');
    els.inputCard.classList.remove('hidden');
    updateQuotaNote();
    refreshAiStatusBadge();
  } catch (e) {
    console.error(e);
  }
}

els.loginBtn.addEventListener('click', () => {
  tokenClient.requestAccessToken();
});

// ===== 曲リストパース → 重複検知 → 検索 =====
els.searchBtn.addEventListener('click', async () => {
  const raw = els.songInput.value.trim();
  if (!raw) { alert('曲名を入力してねぇ'); return; }
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return;
  if (lines.length > 50) {
    if (!confirm(lines.length + '曲あるけど、YouTube APIのクォータ的に一度に多いと厳しいかも。続ける？')) return;
  }

  // 重複チェック（正規化して比較）
  const normalize = s => s.toLowerCase().replace(/[\s\-‐–—・~〜'’"”「」『』()（）]/g, '');
  const seen = {};
  const dupQueries = new Set();
  lines.forEach(l => {
    const n = normalize(l);
    if (seen[n]) dupQueries.add(l);
    seen[n] = true;
  });

  songs = lines.map(q => ({
    query: q,
    candidates: [],
    selectedIndex: 0,
    status: 'searching',
    isDup: dupQueries.has(q)
  }));

  els.inputCard.classList.add('hidden');
  els.resultsCard.classList.remove('hidden');

  if (dupQueries.size > 0) {
    els.dupWarn.classList.remove('hidden');
    els.dupWarn.textContent = `⚠ 重複してそうな曲が${dupQueries.size}件あるよ。リストの内容を確認してみてね`;
  } else {
    els.dupWarn.classList.add('hidden');
  }

  renderSongList();

  els.progressText.classList.remove('hidden');
  for (let i = 0; i < songs.length; i++) {
    els.progressText.textContent = `検索中... (${i + 1}/${songs.length})`;
    await searchOneSong(i);
    renderSongList();
  }
  els.progressText.classList.add('hidden');
  updateQuotaNote();
});

// 既知の「カバー曲であることを明示しない」非公式チャンネル(悪質チャンネル)ブラックリスト
// 小文字化して部分一致でチェックするよ
const KNOWN_COVER_CHANNELS = [
  'highnote',
  'high_note',
  'high note',
  'uta owl',
  'utaowl',
  'カラオケうたたね',
  'カラオケの鉄人',
  'joysound',
  'damともチャンネル',
  'la la tv',
  'lalatv',
  'karaoke',
  'カラオケ歌市場',
  'anime fake music',
  'fleufleu',
  'dさん',
  'ピアノ楽譜',
  // 「-Topic」を名乗っていても実際はオルゴール・BGMアレンジ等の非公式音源業者のチャンネル
  'mobile melody series',
  'orgel',
  'オルゴール',
  'power music workout',
  '8d music',
  'lalala tv',
];

// 主要レコード会社・レーベル名(チャンネル名にこれが入ってれば最優先階層)
const RECORD_LABELS = [
  'king records', 'キングレコード', 'king amusement creative',
  'sony music', 'ソニーミュージック',
  'avex', 'エイベックス',
  'universal music', 'ユニバーサルミュージック', 'nbcuniversal',
  'warner music', 'ワーナーミュージック',
  'toy\'s factory', 'トイズファクトリー',
  'victor entertainment', 'ビクターエンタテインメント',
  'pony canyon', 'ポニーキャニオン',
  'jvckenwood',
  'defstar records',
  'nippon columbia', '日本コロムビア',
];

// アーティスト本人・作曲者本人が直接運用している非レーベル系の公式チャンネル名
// (レコード会社名を名乗らないタイプの「本物」チャンネルをここに追加していく)
const ARTIST_OFFICIAL_CHANNELS = [
  'spcl ryo', // supercell主宰ryo氏の公式チャンネル
  'ryo (supercell)', // 同じくryo氏の別表記チャンネル名
];

// タイトル・チャンネル名に入っていたら「カバー・二次創作が確定」とみなすキーワード
// これに該当したら、公式最優先階層(Official等)であっても強制的に弾く
const DEFINITELY_NOT_OFFICIAL = [
  'cover', 'カバー', '歌ってみた', '弾いてみた', '弾き語り', '叩いてみた',
  'アレンジしてみた', 'リメイクしてみた', 'アレンジ・リメイク',
  'practice', 'karaoke', 'カラオケ', 'instrumental', 'inst.',
  'off vocal', 'オフボーカル', '歌唱', '仮歌', 'モノマネ', 'ものまね',
  'ボーカル講師', 'ボイトレ', 'アカペラ', 'acapella',
  'remix by', 'session', 'セッション',
  'ピアノ楽譜', '楽譜あり', 'ピアノソロ', 'ピアノアレンジ', 'ピアノ', 'midi',
  'ai で', 'aiで', 'aiアレンジ', 'ai cover',
  '歌枠', '切り抜き', 'すたぽら', '歌枠切り抜き', '弾いてみました',
  'マッシュアップ', 'mashup', '歌い方', '解説', 'ボイストレーナー',
];

// 「オリジナルとは歌い手やアレンジが違うバージョン」を示すことが多いキーワード
// (本人公式のTopicチャンネルに登録されていても、実は別歌手カバー+リミックスのような
// 音源が紛れ込むケースがあるため、これらが検出されたら要注意フラグを立てる)
// 注意: "live" など同一アーティストのライブ映像はここに含めない(別途liveでの減点あり)
// 注意2: "feat." "ft." はボカロ曲(例: Orangestar feat. IA)では単なる公式表記として
// 使われることが多く、誤判定が多かったのでここからは除外したよ。あくまで
// 「リミックス」を示す語のみに絞る
const VERSION_MISMATCH_SIGNALS = [
  'remix', 'リミックス', 'mix]', 'mix)',
];

// フル尺ではない「短縮版・TVサイズ」を示すキーワード
// (マスターがフル尺だけ聴きたい場合に、これらを検出して除外するために使う)
const SHORT_VERSION_SIGNALS = [
  'short ver', 'short version', 'tv size', 'tv-size', 'tvsize',
  'tv edit', 'radio edit', 'テレビサイズ', '短縮版', 'ダイジェスト',
];

function hasDefinitelyNotOfficialSignal(snippet) {
  const channel = (snippet.channelTitle || '').toLowerCase();
  const title = (snippet.title || '').toLowerCase();
  return DEFINITELY_NOT_OFFICIAL.some(kw => title.includes(kw) || channel.includes(kw));
}

// タイトルに「歌手違い・リミックス版」らしきシグナルがあるかチェックする
// (例: 「メルト (やなぎなぎ ver.) [CPK! Remix]」のような、公式Topicチャンネルに
//  登録されていても中身がオリジナルと違うバージョンである可能性が高いケースを拾う)
function hasVersionMismatchSignal(snippet) {
  const title = (snippet.title || '').toLowerCase();
  return VERSION_MISMATCH_SIGNALS.some(kw => title.includes(kw));
}

// タイトルに「短縮版・TVサイズ」を示すシグナルがあるかチェックする
function hasShortVersionSignal(snippet) {
  const title = (snippet.title || '').toLowerCase();
  return SHORT_VERSION_SIGNALS.some(kw => title.includes(kw));
}

// レコード会社が正規リリースした楽曲に自動で付与される定型文
// 「Provided to YouTube by [配給会社]」は、Content ID経由の正規音源配信であることの強いシグナルだよ
function hasProvidedToYoutubeSignal(snippet) {
  const desc = (snippet.description || '').toLowerCase();
  return desc.includes('provided to youtube by') || desc.includes('提供元:');
}

// 「公式最優先」階層判定：チャンネル名だけを見て最上位グループかどうかを決める
// (タイトルに紛れ込む単語ではなく、投稿主のチャンネル自体が公式かどうかで判定するのがポイント)
// ただしカバー確定シグナルがあれば、たとえチャンネル名が"Official"を名乗っていても除外する
function isTopTierOfficial(snippet) {
  if (hasDefinitelyNotOfficialSignal(snippet)) return false; // カバー確定なら問答無用で対象外
  if (hasVersionMismatchSignal(snippet)) return false; // 歌手違い・リミックス版らしきものも対象外
  if (hasShortVersionSignal(snippet)) return false; // 短縮版・TVサイズも対象外
  const channel = (snippet.channelTitle || '').toLowerCase();
  if (hasProvidedToYoutubeSignal(snippet)) return true; // Content ID経由の正規配信は最優先で信頼する
  if (channel.includes('- topic')) return true; // YouTube自動生成トピックチャンネル(公式音源のみが対象)
  if (channel.includes('vevo')) return true;
  if (channel.endsWith('official') || channel.includes(' official') || channel.includes('official ')) return true;
  if (RECORD_LABELS.some(label => channel.includes(label))) return true;
  if (ARTIST_OFFICIAL_CHANNELS.some(name => channel === name || channel.includes(name))) return true;
  return false;
}

// 公式らしさスコアリング(同じ階層内での並び替え用の細かい調整に使う)
function officialScore(snippet) {
  const channel = (snippet.channelTitle || '').toLowerCase();
  const title = (snippet.title || '').toLowerCase();
  let score = 0;

  if (isTopTierOfficial(snippet)) score += 1000; // 最優先階層は常にトップ固定
  if (hasProvidedToYoutubeSignal(snippet)) score += 40; // 同階層内でもさらに信頼度を上乗せ
  if (title.includes('official')) score += 30;
  if (title.includes('mv') || title.includes('music video')) score += 15;
  if (channel.includes('records') || channel.includes('レコード') || channel.includes('music entertainment')) score += 20;

  // 減点要素(カバー・歌ってみた・カラオケ系など、確定シグナル一覧を流用)
  DEFINITELY_NOT_OFFICIAL.forEach(kw => {
    if (title.includes(kw)) score -= 200; // 公式スコア(+1000)を確実に打ち消せる強さにする
    if (channel.includes(kw)) score -= 250;
  });
  if (title.includes('live') || title.includes('ライブ')) score -= 10;

  // 既知の非公式チャンネル(カバー曲であることを明示しない悪質チャンネル含む)は問答無用で大幅減点
  if (KNOWN_COVER_CHANNELS.some(bad => channel.includes(bad))) {
    score -= 800;
  }

  return score;
}
function isOfficialish(snippet) {
  return isTopTierOfficial(snippet);
}
function isBlacklisted(snippet) {
  const channel = (snippet.channelTitle || '').toLowerCase();
  return KNOWN_COVER_CHANNELS.some(bad => channel.includes(bad));
}

async function openResearchPrompt(index) {

  if (newQuery === null) return;
  const trimmed = newQuery.trim();
  if (!trimmed) return;

  item.status = 'searching';

}

// ===== Gemini APIで候補の公式らしさを判定 =====
async function askGeminiForOfficialRanking(query, candidates) {
  const apiKey = getGeminiApiKey();
  if (!apiKey || candidates.length === 0) return null;

  const list = candidates.map((c, i) =>
    `${i}: タイトル「${c.title}」 / チャンネル名「${c.channel}」`
  ).join('\n');

  const prompt = `あなたはYouTube動画から「公式音源・公式MV」を見分ける専門家だよ。
検索したい曲: 「${query}」

以下はYouTube検索で見つかった候補一覧だよ。この中から、公式のアーティスト本人・レコード会社が公開している「公式音源」「公式MV」らしい順に、番号を並べ替えてほしいよ。
カバー、歌ってみた、弾いてみた、カラオケ、ピアノ楽譜、MIDI、AIアレンジ、ライブ映像、切り抜き動画などは非公式として下位に置いてね。
もし全部が非公式に見える場合でも、必ず全ての番号を含めて並べ替えてね。

候補一覧:
${list}

必ず以下のJSON形式のみで回答してね。説明文は不要だよ。
{"order": [最も公式らしい番号, 次に公式らしい番号, ...]}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0, responseMimeType: 'application/json' }
        })
      }
    );
    if (!res.ok) {
      console.error('Gemini API error', res.status, await res.text().catch(() => ''));
      return null;
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) return null;
    const parsed = JSON.parse(text);
    if (!Array.isArray(parsed.order)) return null;
    return parsed.order;
  } catch (e) {
    console.error('Gemini判定エラー', e);
    return null;
  }
}

// 全角記号・半角記号を統一し、判定に不要な記号を幅広く除去する
function normalizeForMatch(str) {
  return str
    .toLowerCase()
    // 全角英数記号を半角に変換
    .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    // 曲名によくある装飾記号・約物をまとめてスペースに置換
    .replace(/[「」『』（）()・\-–—~〜'’"”,、。!！?？☆★♪♫#＃/／:：;；.]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// 検索クエリ(曲名・アーティスト名)が、候補のタイトルに全く含まれていないかチェックする
// 「公式チャンネルだけど全然関係ない曲がヒットしてる」パターン(RIDEBACK問題)を検出するため
function looksUnrelatedToQuery(query, candidateTitle) {
  const normalizedQuery = normalizeForMatch(query);
  const normalizedTitle = normalizeForMatch(candidateTitle);

  // 記号を落とした後、スペース区切り＋英数字/日本語の境界でも分割して単語化
  // (「motto派手にね」のような記号なし連結語も、ある程度の粒度で拾えるようにする)
  const rawWords = normalizedQuery
    .split(/\s+/)
    .flatMap(w => w.split(/(?<=[a-z0-9])(?=[^\x00-\x7f])|(?<=[^\x00-\x7f])(?=[a-z0-9])/));
  const words = rawWords.filter(w => w.length >= 2);
  if (words.length === 0) return false; // 判定できない場合は「無関係」とはみなさない

  const matchCount = words.filter(w => normalizedTitle.includes(w)).length;
  // クエリの単語のうち、タイトルに1つも一致しなければ「無関係の可能性が高い」と判定
  return matchCount === 0;
}

async function searchOneSong(index) {
  const item = songs[index];
  try {
    const url = new URL('https://www.googleapis.com/youtube/v3/search');
    url.searchParams.set('part', 'snippet');
    // 単語間のスペースを確実に保つ(IKU + RIDEBACK が「IKURIDEBACK」のように
    // くっついて誤検索されるのを防ぐため、明示的にスペースで単語を区切り直す)
    const normalizedQuery = item.query.trim().replace(/\s+/g, ' ');
    url.searchParams.set('q', normalizedQuery + ' 音楽');
    url.searchParams.set('type', 'video');
    url.searchParams.set('videoCategoryId', '10');
    url.searchParams.set('maxResults', '8');
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    addQuota(100);
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || res.status);
    }
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      const scored = data.items
        .filter(v => !isBlacklisted(v.snippet)) // 悪質チャンネルは候補から完全除外
        .map(v => ({
          videoId: v.id.videoId,
          title: decodeHtmlEntities(v.snippet.title),
          channel: v.snippet.channelTitle,
          thumb: v.snippet.thumbnails?.default?.url || '',
          score: officialScore(v.snippet),
          official: isOfficialish(v.snippet),
          definitelyNotOfficial: hasDefinitelyNotOfficialSignal(v.snippet),
          titleMismatch: looksUnrelatedToQuery(item.query, decodeHtmlEntities(v.snippet.title)),
          versionMismatch: hasVersionMismatchSignal(v.snippet),
          shortVersion: hasShortVersionSignal(v.snippet)
        }));
      // スコア順に並び替え（公式っぽいものを上に）
      scored.sort((a, b) => b.score - a.score);

      // 公式チャンネル(-Topic, VEVO, レコード会社等)かつ曲名も一致してる候補だけを採用するよ。
      // これが0件の場合、非公式動画をフォールバックとして絶対に出さない
      // (「歌い方解説」「マッシュアップ」等、キーワードリストに載ってないカバー系動画が
      //  紛れ込むのを防ぐため。キーワードを無限に追加するより、公式候補が無ければ
      //  素直に「見つからなかった」と言う方が安全、という判断だよ)
      const officialOnly = scored.filter(c => c.official && !c.titleMismatch);

      if (officialOnly.length === 0) {
        item.candidates = [];
        item.status = 'none';
        item.noOfficialFound = true; // UIで「候補が見つからなかった(公式が無かった)」と案内するためのフラグ
        return;
      }

      item.candidates = officialOnly.slice(0, 5);

      // AI判定(Gemini APIキーが設定されていれば追加で並び替えの参考にする)
      const aiOrder = await askGeminiForOfficialRanking(item.query, item.candidates);
      if (aiOrder && aiOrder.length > 0) {
        item.candidates.forEach((c, i) => {
          const rank = aiOrder.indexOf(i);
          c.aiRank = rank === -1 ? 999 : rank;
        });
        // 優先順位: ①ルールベースで「確実に公式」と分かっているもの(official===true)を最優先
        //           ②その中/外はAIのランキングを参考に並び替え
        //           ③最後にルールベースのスコアで細かく調整
        // ルールで公式確定してるチャンネル(-Topic, VEVO, レコード会社名, spcl ryo等)は
        // AIが間違って別の動画を上位に推してきても、それより常に上に来るようにする
        item.candidates.sort((a, b) => {
          if (a.official !== b.official) return a.official ? -1 : 1;
          if (a.aiRank !== b.aiRank) return a.aiRank - b.aiRank;
          return b.score - a.score;
        });
        item.aiJudged = true;
      } else {
        item.aiJudged = false;
      }

      item.selectedIndex = item.candidates.length > 0 ? 0 : -1;
      item.status = item.candidates.length > 0 ? 'ok' : 'none';
    } else {
      item.status = 'none';
    }
  } catch (e) {
    console.error('search error', item.query, e);
    item.status = 'none';
  }
}

function renderSongList() {
  els.songList.innerHTML = '';
  songs.forEach((item, i) => {
    const block = document.createElement('div');
    block.className = 'song-block';

    const header = document.createElement('div');
    header.className = 'song-block-header';
    const q = document.createElement('div');
    q.className = 'song-query';
    q.textContent = item.query;
    header.appendChild(q);
    if (item.isDup) {
      const badge = document.createElement('span');
      badge.className = 'dup-badge';
      badge.textContent = '重複注意';
      header.appendChild(badge);
    }
    if (item.aiJudged) {
      const aiBadge = document.createElement('span');
      aiBadge.className = 'official-badge';
      aiBadge.textContent = 'AI判定済み';
      header.appendChild(aiBadge);
    }
    const researchBtn = document.createElement('button');
    researchBtn.className = 'btn-small';
    researchBtn.textContent = '再検索';
    researchBtn.style.flexShrink = '0';
    researchBtn.addEventListener('click', () => openResearchPrompt(i));
    header.appendChild(researchBtn);
    block.appendChild(header);

    if (item.status === 'searching') {
      const s = document.createElement('div');
      s.className = 'status-searching';
      s.innerHTML = '<span class="spinner"></span> 検索中...';
      block.appendChild(s);
    } else if (item.status === 'none') {
      const s = document.createElement('div');
      s.className = 'status-none';
      s.textContent = item.noOfficialFound
        ? '✗ 公式音源が見つからなかった（非公式のみだったため除外したよ）'
        : '✗ 見つからなかった';
      block.appendChild(s);
    } else {
      const list = document.createElement('div');
      list.className = 'candidate-list';
      item.candidates.forEach((c, ci) => {
        const row = document.createElement('div');
        row.className = 'candidate-row' + (ci === item.selectedIndex ? ' selected' : '');
        row.addEventListener('click', () => {
          item.selectedIndex = ci;
          renderSongList();
        });

        const dot = document.createElement('div');
        dot.className = 'radio-dot' + (ci === item.selectedIndex ? ' on' : '');

        const img = document.createElement('img');
        img.src = c.thumb;
        img.alt = '';

        const info = document.createElement('div');
        info.className = 'candidate-info';
        const title = document.createElement('div');
        title.className = 'candidate-title';
        title.textContent = c.title;
        const ch = document.createElement('div');
        ch.className = 'candidate-channel';
        ch.textContent = c.channel;
        if (c.official) {
          const ob = document.createElement('span');
          ob.className = 'official-badge';
          ob.textContent = '公式っぽい';
          ch.appendChild(ob);
        }
        if (c.titleMismatch) {
          const wb = document.createElement('span');
          wb.className = 'dup-badge';
          wb.textContent = '⚠曲名と不一致かも';
          ch.appendChild(wb);
        }
        if (c.versionMismatch) {
          const vb = document.createElement('span');
          vb.className = 'dup-badge';
          vb.textContent = '⚠別バージョンかも';
          ch.appendChild(vb);
        }
        if (c.shortVersion) {
          const sb = document.createElement('span');
          sb.className = 'dup-badge';
          sb.textContent = '⚠短縮版かも';
          ch.appendChild(sb);
        }
        info.appendChild(title);
        info.appendChild(ch);

        row.appendChild(dot);
        row.appendChild(img);
        row.appendChild(info);
        list.appendChild(row);
      });

      // 除外オプション
      const excludeRow = document.createElement('div');
      excludeRow.className = 'candidate-row' + (item.selectedIndex === -1 ? ' selected' : '') + (item.selectedIndex === -1 ? '' : '');
      excludeRow.style.justifyContent = 'center';
      excludeRow.style.padding = '6px';
      excludeRow.addEventListener('click', () => {
        item.selectedIndex = -1;
        renderSongList();
      });
      const excludeDot = document.createElement('div');
      excludeDot.className = 'radio-dot' + (item.selectedIndex === -1 ? ' on' : '');
      const excludeLabel = document.createElement('div');
      excludeLabel.style.fontSize = '12px';
      excludeLabel.style.color = 'var(--sub)';
      excludeLabel.textContent = 'この曲は追加しない';
      excludeRow.appendChild(excludeDot);
      excludeRow.appendChild(excludeLabel);
      list.appendChild(excludeRow);

      block.appendChild(list);
    }

    els.songList.appendChild(block);
  });
}

async function loadUserPlaylists() {
  els.existingSelect.innerHTML = '<option>読み込み中...</option>';
  try {
    const url = new URL('https://www.googleapis.com/youtube/v3/playlists');
    url.searchParams.set('part', 'snippet');
    url.searchParams.set('mine', 'true');
    url.searchParams.set('maxResults', '50');
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    addQuota(1);
    updateQuotaNote();
    const data = await res.json();
    userPlaylists = data.items || [];
    if (userPlaylists.length === 0) {
      els.existingSelect.innerHTML = '<option value="">プレイリストが見つからないよ</option>';
    } else {
      els.existingSelect.innerHTML = userPlaylists.map(p =>
        `<option value="${p.id}">${decodeHtmlEntities(p.snippet.title)}</option>`
      ).join('');
    }
  } catch (e) {
    console.error(e);
    els.existingSelect.innerHTML = '<option value="">読み込みエラー</option>';
  }
}

function renderOrderList() {
  els.orderList.innerHTML = '';
  finalOrder.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'order-row';

    const img = document.createElement('img');
    img.src = item.thumb;
    img.alt = '';

    const title = document.createElement('div');
    title.className = 'order-title';
    title.textContent = item.title;

    const arrows = document.createElement('div');
    arrows.className = 'order-arrows';
    const upBtn = document.createElement('button');
    upBtn.className = 'btn-small';
    upBtn.textContent = '↑';
    upBtn.disabled = i === 0;
    upBtn.addEventListener('click', () => {
      [finalOrder[i - 1], finalOrder[i]] = [finalOrder[i], finalOrder[i - 1]];
      renderOrderList();
    });
    const downBtn = document.createElement('button');
    downBtn.className = 'btn-small';
    downBtn.textContent = '↓';
    downBtn.disabled = i === finalOrder.length - 1;
    downBtn.addEventListener('click', () => {
      [finalOrder[i + 1], finalOrder[i]] = [finalOrder[i], finalOrder[i + 1]];
      renderOrderList();
    });
    arrows.appendChild(upBtn);
    arrows.appendChild(downBtn);

    row.appendChild(img);
    row.appendChild(title);
    row.appendChild(arrows);
    els.orderList.appendChild(row);
  });
}

els.orderBackBtn.addEventListener('click', () => {
  els.orderCard.classList.add('hidden');
  els.resultsCard.classList.remove('hidden');
});

// ===== 実際にプレイリスト作成/追加を実行 =====
els.orderConfirmBtn.addEventListener('click', async () => {
  els.orderConfirmBtn.disabled = true;
  els.orderConfirmBtn.textContent = '作成中...';

  try {
    let playlistId;
    if (addMode === 'existing') {
      playlistId = els.existingSelect.value;
    } else {
      const name = els.playlistName.value.trim() || ('Playlist Forge ' + new Date().toLocaleDateString('ja-JP'));
      const createRes = await fetch('https://www.googleapis.com/youtube/v3/playlists?part=snippet,status', {
        method: 'POST',
        headers: {
          Authorization: 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          snippet: { title: name, description: 'Playlist Forgeで作成' },
          status: { privacyStatus: 'private' }
        })
      });
      addQuota(50);
      if (!createRes.ok) {
        const err = await createRes.json().catch(() => ({}));
        throw new Error(err?.error?.message || 'プレイリスト作成失敗');
      }
      const playlistData = await createRes.json();
      playlistId = playlistData.id;
    }

    let successCount = 0;
    for (let i = 0; i < finalOrder.length; i++) {
      els.orderConfirmBtn.textContent = `追加中 (${i + 1}/${finalOrder.length})`;
      const item = finalOrder[i];
      try {
        const addRes = await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet', {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            snippet: {
              playlistId: playlistId,
              resourceId: { kind: 'youtube#video', videoId: item.videoId }
            }
          })
        });
        addQuota(50);
        if (addRes.ok) successCount++;
      } catch (e) {
        console.error('add error', item.query, e);
      }
    }

    els.orderCard.classList.add('hidden');
    els.doneCard.classList.remove('hidden');
    els.doneCount.textContent = `${successCount} / ${finalOrder.length} 曲を追加したよ`;
    els.playlistLink.href = `https://music.youtube.com/playlist?list=${playlistId}`;
    updateQuotaNote();

  } catch (e) {
    console.error(e);
    alert('エラーが起きたよ: ' + e.message);
  } finally {
    els.orderConfirmBtn.disabled = false;
    els.orderConfirmBtn.textContent = 'この順番で追加';
  }
});

els.anotherBtn.addEventListener('click', () => {
  songs = [];
  finalOrder = [];
  els.songInput.value = '';
  els.playlistName.value = '';
  els.doneCard.classList.add('hidden');
  els.inputCard.classList.remove('hidden');
  addMode = 'new';
  els.modeNew.classList.add('active');
  els.modeExisting.classList.remove('active');
  els.playlistName.classList.remove('hidden');
  els.existingSelect.classList.add('hidden');
});

// 起動時: Google Identity Services準備を待つ
window.addEventListener('load', () => {
  const check = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(check);
      initGoogleAuth();
    }
  }, 100);
});
</script>
