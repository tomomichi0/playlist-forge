<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Playlist Forge</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiUGxheWxpc3QgRm9yZ2UiLCJzaG9ydF9uYW1lIjoiUGxheWxpc3QiLCJzdGFydF91cmwiOiIuLyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjBmMTQiLCJ0aGVtZV9jb2xvciI6IiNmZjAwMDAifQ==">
<style>
  :root {
    --bg: #0f0f14;
    --card: #1a1a22;
    --accent: #ff3b3b;
    --accent2: #ff6b6b;
    --text: #f2f2f5;
    --sub: #9a9aa5;
    --border: #2a2a34;
    --success: #3ddc84;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: linear-gradient(160deg, #0f0f14 0%, #17171f 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 20px 16px 60px;
  }
  h1 {
    font-size: 22px;
    margin: 10px 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle {
    color: var(--sub);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card h2 {
    font-size: 15px;
    margin: 0 0 12px;
    color: var(--accent2);
  }
  button {
    font-family: inherit;
    border: none;
    border-radius: 12px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    width: 100%;
  }
  .btn-secondary {
    background: #2a2a34;
    color: var(--text);
    width: 100%;
  }
  .btn-small {
    background: #2a2a34;
    color: var(--text);
    padding: 8px 14px;
    font-size: 13px;
  }
  textarea, input[type=text] {
    width: 100%;
    background: #12121a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  textarea { min-height: 110px; }
  textarea:focus, input:focus { outline: 1px solid var(--accent); }
  .user-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #12121a;
    border-radius: 12px;
    padding: 10px 12px;
  }
  .user-badge img {
    width: 36px; height: 36px; border-radius: 50%;
  }
  .user-badge .name { font-size: 14px; font-weight: 600; }
  .user-badge .email { font-size: 11px; color: var(--sub); }
  .song-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .song-row:last-child { border-bottom: none; }
  .song-row img {
    width: 56px; height: 42px; object-fit: cover; border-radius: 6px; flex-shrink: 0;
    background: #222;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 13.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-channel { font-size: 11.5px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-status { font-size: 11px; flex-shrink: 0; }
  .status-ok { color: var(--success); }
  .status-searching { color: var(--sub); }
  .status-none { color: #d9534f; }
  .toggle-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .toggle-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .progress-text { font-size: 12px; color: var(--sub); margin-top: 8px; text-align: center; }
  .result-box {
    background: #12121a;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    font-size: 14px;
  }
  .result-box a {
    color: var(--accent2);
    word-break: break-all;
  }
  .hidden { display: none !important; }
  .row-buttons { display: flex; gap: 10px; }
  .row-buttons button { flex: 1; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-note { font-size: 11px; color: var(--sub); text-align: center; margin-top: 24px; line-height: 1.6; }
</style>
</head>
<body>

<h1>🎵 Playlist Forge</h1>
<div class="subtitle">曲名リストからYouTube Musicのプレイリストを自動作成</div>

<!-- ログインカード -->
<div class="card" id="loginCard">
  <h2>1. Googleでログイン</h2>
  <div id="loginArea">
    <button class="btn-primary" id="loginBtn">Googleでログイン</button>
  </div>
  <div id="userArea" class="hidden">
    <div class="user-badge">
      <img id="userPhoto" src="" alt="">
      <div>
        <div class="name" id="userName"></div>
        <div class="email" id="userEmail"></div>
      </div>
    </div>
  </div>
</div>

<!-- 曲入力カード -->
<div class="card hidden" id="inputCard">
  <h2>2. 曲名リストを貼り付け</h2>
  <textarea id="songInput" placeholder="1曲1行で貼り付けてね&#10;例:&#10;優里 - ドライフラワー&#10;YOASOBI 群青&#10;Mrs. GREEN APPLE 青と夏"></textarea>
  <div style="height:12px"></div>
  <button class="btn-primary" id="searchBtn">曲を検索する</button>
</div>

<!-- 検索結果カード -->
<div class="card hidden" id="resultsCard">
  <h2>3. 曲を確認・選択</h2>
  <div id="progressText" class="progress-text hidden"></div>
  <div id="songList"></div>
  <div style="height:14px"></div>
  <input type="text" id="playlistName" placeholder="プレイリスト名（例: 2026年7月のお気に入り）">
  <div style="height:12px"></div>
  <div class="row-buttons">
    <button class="btn-secondary" id="backBtn">戻る</button>
    <button class="btn-primary" id="createBtn">プレイリストを作成</button>
  </div>
</div>

<!-- 完了カード -->
<div class="card hidden" id="doneCard">
  <h2>✅ 完成！</h2>
  <div class="result-box">
    <div id="doneCount" style="margin-bottom:8px;"></div>
    <a id="playlistLink" href="#" target="_blank">YouTube Musicで開く</a>
  </div>
  <div style="height:12px"></div>
  <button class="btn-secondary" id="anotherBtn">もう一度作る</button>
</div>

<div class="footer-note">
  マスター専用ツール・YouTube Data API使用<br>
  無料枠の範囲で動作するよ
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = "1244880388-sl1ijkj4urp7lpu25hc08ajcq8u9qp8t.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/youtube";

let accessToken = null;
let tokenClient = null;
let searchResults = []; // {query, videoId, title, channel, thumb, status, selected}

const els = {
  loginBtn: document.getElementById('loginBtn'),
  loginArea: document.getElementById('loginArea'),
  userArea: document.getElementById('userArea'),
  userPhoto: document.getElementById('userPhoto'),
  userName: document.getElementById('userName'),
  userEmail: document.getElementById('userEmail'),
  inputCard: document.getElementById('inputCard'),
  songInput: document.getElementById('songInput'),
  searchBtn: document.getElementById('searchBtn'),
  resultsCard: document.getElementById('resultsCard'),
  songList: document.getElementById('songList'),
  progressText: document.getElementById('progressText'),
  playlistName: document.getElementById('playlistName'),
  backBtn: document.getElementById('backBtn'),
  createBtn: document.getElementById('createBtn'),
  doneCard: document.getElementById('doneCard'),
  doneCount: document.getElementById('doneCount'),
  playlistLink: document.getElementById('playlistLink'),
  anotherBtn: document.getElementById('anotherBtn'),
};

function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        alert('ログインに失敗したよ: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      localStorage.setItem('pf_token', accessToken);
      localStorage.setItem('pf_token_time', Date.now().toString());
      await fetchUserInfo();
    }
  });
}

async function fetchUserInfo() {
  try {
    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const data = await res.json();
    els.userPhoto.src = data.picture || '';
    els.userName.textContent = data.name || 'マスター';
    els.userEmail.textContent = data.email || '';
    els.loginArea.classList.add('hidden');
    els.userArea.classList.remove('hidden');
    els.inputCard.classList.remove('hidden');
  } catch (e) {
    console.error(e);
  }
}

els.loginBtn.addEventListener('click', () => {
  tokenClient.requestAccessToken();
});

// 曲リストパース → 検索
els.searchBtn.addEventListener('click', async () => {
  const raw = els.songInput.value.trim();
  if (!raw) { alert('曲名を入力してねぇ'); return; }
  const lines = raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length === 0) return;
  if (lines.length > 50) {
    if (!confirm(lines.length + '曲あるけど、YouTube APIのクォータ的に一度に多いと厳しいかも。続ける？')) return;
  }

  searchResults = lines.map(q => ({ query: q, videoId: null, title: '', channel: '', thumb: '', status: 'searching', selected: true }));
  els.inputCard.classList.add('hidden');
  els.resultsCard.classList.remove('hidden');
  renderSongList();

  els.progressText.classList.remove('hidden');
  for (let i = 0; i < searchResults.length; i++) {
    els.progressText.textContent = `検索中... (${i + 1}/${searchResults.length})`;
    await searchOneSong(i);
    renderSongList();
  }
  els.progressText.classList.add('hidden');
});

async function searchOneSong(index) {
  const item = searchResults[index];
  try {
    const url = new URL('https://www.googleapis.com/youtube/v3/search');
    url.searchParams.set('part', 'snippet');
    url.searchParams.set('q', item.query + ' 音楽');
    url.searchParams.set('type', 'video');
    url.searchParams.set('videoCategoryId', '10');
    url.searchParams.set('maxResults', '1');
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + accessToken } });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData?.error?.message || res.status);
    }
    const data = await res.json();
    if (data.items && data.items.length > 0) {
      const v = data.items[0];
      item.videoId = v.id.videoId;
      item.title = v.snippet.title;
      item.channel = v.snippet.channelTitle;
      item.thumb = v.snippet.thumbnails?.default?.url || '';
      item.status = 'ok';
    } else {
      item.status = 'none';
    }
  } catch (e) {
    console.error('search error', item.query, e);
    item.status = 'none';
  }
}

function decodeHtmlEntities(str) {
  if (!str) return '';
  const el = document.createElement('textarea');
  el.innerHTML = str;
  return el.value;
}

function renderSongList() {
  els.songList.innerHTML = '';
  searchResults.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'song-row';

    const check = document.createElement('div');
    check.className = 'toggle-check' + (item.selected && item.status === 'ok' ? ' checked' : '');
    if (item.status === 'ok') {
      check.textContent = item.selected ? '✓' : '';
      check.style.cursor = 'pointer';
      check.addEventListener('click', () => {
        item.selected = !item.selected;
        renderSongList();
      });
    } else {
      check.style.opacity = '0.3';
    }

    const img = document.createElement('img');
    img.src = item.thumb || '';
    img.alt = '';

    const info = document.createElement('div');
    info.className = 'song-info';
    const title = document.createElement('div');
    title.className = 'song-title';
    title.textContent = item.status === 'ok' ? decodeHtmlEntities(item.title) : item.query;
    const channel = document.createElement('div');
    channel.className = 'song-channel';
    channel.textContent = item.status === 'ok' ? item.channel : (item.status === 'searching' ? '検索中...' : '見つからなかった');
    info.appendChild(title);
    info.appendChild(channel);

    const status = document.createElement('div');
    status.className = 'song-status ' + (item.status === 'ok' ? 'status-ok' : item.status === 'searching' ? 'status-searching' : 'status-none');
    if (item.status === 'searching') {
      status.innerHTML = '<span class="spinner"></span>';
    } else if (item.status === 'ok') {
      status.textContent = '✓';
    } else {
      status.textContent = '✗';
    }

    row.appendChild(check);
    row.appendChild(img);
    row.appendChild(info);
    row.appendChild(status);
    els.songList.appendChild(row);
  });
}

els.backBtn.addEventListener('click', () => {
  els.resultsCard.classList.add('hidden');
  els.inputCard.classList.remove('hidden');
});

els.createBtn.addEventListener('click', async () => {
  const selected = searchResults.filter(s => s.status === 'ok' && s.selected);
  if (selected.length === 0) {
    alert('プレイリストに追加できる曲がないよ');
    return;
  }
  const name = els.playlistName.value.trim() || ('Playlist Forge ' + new Date().toLocaleDateString('ja-JP'));

  els.createBtn.disabled = true;
  els.createBtn.textContent = '作成中...';

  try {
    // プレイリスト作成
    const createRes = await fetch('https://www.googleapis.com/youtube/v3/playlists?part=snippet,status', {
      method: 'POST',
      headers: {
        Authorization: 'Bearer ' + accessToken,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        snippet: { title: name, description: 'Playlist Forgeで作成' },
        status: { privacyStatus: 'private' }
      })
    });
    if (!createRes.ok) {
      const err = await createRes.json().catch(() => ({}));
      throw new Error(err?.error?.message || 'プレイリスト作成失敗');
    }
    const playlistData = await createRes.json();
    const playlistId = playlistData.id;

    // 曲を順番に追加
    let successCount = 0;
    for (let i = 0; i < selected.length; i++) {
      els.createBtn.textContent = `追加中 (${i + 1}/${selected.length})`;
      const item = selected[i];
      try {
        const addRes = await fetch('https://www.googleapis.com/youtube/v3/playlistItems?part=snippet', {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + accessToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            snippet: {
              playlistId: playlistId,
              resourceId: { kind: 'youtube#video', videoId: item.videoId }
            }
          })
        });
        if (addRes.ok) successCount++;
      } catch (e) {
        console.error('add error', item.query, e);
      }
    }

    els.resultsCard.classList.add('hidden');
    els.doneCard.classList.remove('hidden');
    els.doneCount.textContent = `${successCount} / ${selected.length} 曲を追加したよ`;
    els.playlistLink.href = `https://music.youtube.com/playlist?list=${playlistId}`;

  } catch (e) {
    console.error(e);
    alert('エラーが起きたよ: ' + e.message);
  } finally {
    els.createBtn.disabled = false;
    els.createBtn.textContent = 'プレイリストを作成';
  }
});

els.anotherBtn.addEventListener('click', () => {
  searchResults = [];
  els.songInput.value = '';
  els.playlistName.value = '';
  els.doneCard.classList.add('hidden');
  els.inputCard.classList.remove('hidden');
});

// 起動時: Google Identity Services準備を待つ
window.addEventListener('load', () => {
  const check = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(check);
      initGoogleAuth();
    }
  }, 100);
});
</script>
</body>
</html>
